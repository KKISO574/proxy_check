app:
  database_url: sqlite+aiosqlite:///./data/proxy_check.sqlite3
  static_dir: app/static

mihomo:
  bin: ./runtime/bin/mihomo
  source_config_path: ""
  work_dir: ./runtime/mihomo
  imported_config_dir: ./runtime/configs
  controller_host: 127.0.0.1
  controller_port: 9090
  secret_env: MIHOMO_SECRET
  listener_host: 127.0.0.1
  listener_port_start: 20000
  listener_port_max: 65000

probe:
  interval_seconds: 60
  concurrency: 100
  timeout_ms: 5000
  import_timeout_ms: 30000
  retention_days: 30
  delay_url: https://cp.cloudflare.com/generate_204
  dimensions:
    - delay
    - tcping
    - tls_handshake
    - http_rtt
    - jitter
    - packet_loss
    - exit_geo
  tcp_targets:
    - host: 1.1.1.1
      port: 443
    - host: 1.1.1.1
      port: 80
    - host: 8.8.8.8
      port: 443
    - host: 8.8.8.8
      port: 80
